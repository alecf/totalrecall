name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.4
        run: sudo xcode-select -s /Applications/Xcode_26.4.app

      - name: Show environment
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Build all targets
        run: swift build

      - name: Run tests
        run: swift test

      - name: Build release
        run: swift build -c release
