name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_17.0.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Show Swift version
        run: swift --version

      - name: Build all targets
        run: swift build

      - name: Run tests
        run: swift test

      - name: Build release
        run: swift build -c release
