name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 26.4
        run: sudo xcode-select -s /Applications/Xcode_26.4.app

      - name: Calculate next version
        id: version
        uses: orhun/git-cliff-action@v4
        with:
          args: --bumped-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          args: --latest --strip header
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version number
        id: ver
        run: |
          RAW="${{ steps.version.outputs.version }}"
          VERSION="${RAW#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "TAG=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${VERSION}"

      - name: Run tests
        run: swift test

      - name: Build release binary
        run: swift build -c release --product TotalRecall

      - name: Assemble app bundle
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          APP="Total Recall.app"
          mkdir -p "${APP}/Contents/MacOS"
          mkdir -p "${APP}/Contents/Resources"
          cp .build/release/TotalRecall "${APP}/Contents/MacOS/"
          sed "s/VERSION_PLACEHOLDER/${VERSION}/g" \
            Distribution/Info.plist > "${APP}/Contents/Info.plist"

      - name: Create DMG
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          mkdir -p dmg-staging
          cp -R "Total Recall.app" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create \
            -volname "Total Recall" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "TotalRecall-${VERSION}-arm64.dmg"

      - name: Create tag
        run: |
          git tag "${{ steps.ver.outputs.TAG }}"
          git push origin "${{ steps.ver.outputs.TAG }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: Total Recall ${{ steps.ver.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.content }}
          files: TotalRecall-*.dmg
