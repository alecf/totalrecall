name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 26.4
        run: sudo xcode-select -s /Applications/Xcode_26.4.app

      - name: Install git-cliff
        run: brew install git-cliff

      - name: Calculate version and changelog
        id: ver
        run: |
          VERSION=$(git-cliff --bumped-version 2>/dev/null)
          VERSION="${VERSION#v}"
          if [ -z "$VERSION" ]; then
            echo "::error::git-cliff could not calculate a version"
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "TAG=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${VERSION}"

          # Generate changelog for this release
          CHANGELOG=$(git-cliff --latest --strip header 2>/dev/null)
          # Write multiline output using delimiter
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "CHANGELOG<<${EOF}" >> "$GITHUB_OUTPUT"
          echo "${CHANGELOG}" >> "$GITHUB_OUTPUT"
          echo "${EOF}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: swift test

      - name: Build release binary
        run: swift build -c release --product TotalRecall

      - name: Assemble app bundle
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          APP="Total Recall.app"
          mkdir -p "${APP}/Contents/MacOS"
          mkdir -p "${APP}/Contents/Resources"
          cp .build/release/TotalRecall "${APP}/Contents/MacOS/"
          sed "s/VERSION_PLACEHOLDER/${VERSION}/g" \
            Distribution/Info.plist > "${APP}/Contents/Info.plist"

      - name: Ad-hoc sign app bundle
        run: |
          APP="Total Recall.app"
          codesign --force --deep --sign - --timestamp=none "${APP}"
          codesign --verify --verbose "${APP}"
          spctl --assess --type execute --verbose "${APP}" || true

      - name: Create DMG
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          mkdir -p dmg-staging
          cp -R "Total Recall.app" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create \
            -volname "Total Recall" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "TotalRecall-${VERSION}-arm64.dmg"

      - name: Create tag
        run: |
          git tag "${{ steps.ver.outputs.TAG }}"
          git push origin "${{ steps.ver.outputs.TAG }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: Total Recall ${{ steps.ver.outputs.VERSION }}
          body: ${{ steps.ver.outputs.CHANGELOG }}
          files: TotalRecall-*.dmg
